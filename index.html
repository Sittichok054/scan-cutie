<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คิดถึงเค้ามั้ย?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&family=Itim&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Itim', cursive;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border: 4px solid #f8bbd0;
            z-index: 10;
            max-width: 90%;
            width: 450px;
        }

        /* เมื่อเริ่มเกม ปุ่มไม่คิดถึงจะอยู่ปกติ แต่พอจะโดนตัวจะกลายเป็น fixed เพื่อวิ่งหนี */
        #no-btn {
            transition: all 0.15s ease-out;
            white-space: nowrap;
            z-index: 20;
        }

        .emoji-float {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            animation: floatUp 2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        .custom-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            z-index: 1000;
            text-align: center;
            border: 3px solid #f48fb1;
            width: 320px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }

        .btn-hover:hover {
            transform: scale(1.1);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            min-height: 60px;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    <div class="custom-modal" id="modal">
        <div class="text-5xl mb-4">🤨</div>
        <p class="text-2xl mb-6 text-gray-700 font-bold" id="modal-text">กดผิดแน่ๆ!</p>
        <button onclick="closeModal()" class="bg-pink-500 hover:bg-pink-600 text-white px-8 py-3 rounded-full font-bold text-lg shadow-md transition-transform active:scale-95">
            ขอโทษที กดใหม่จ้าา
        </button>
    </div>

    <div class="card" id="main-card">
        <div id="icon-display" class="text-8xl mb-6">💖</div>
        <h1 class="text-4xl font-bold text-pink-600 mb-6" id="question-text">คิดถึงเค้ามั้ย?</h1>
        
        <div class="btn-container">
            <button id="yes-btn" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all btn-hover text-xl">
                คิดถึงที่สุด
            </button>
            
            <button id="no-btn" class="bg-gray-400 text-white font-bold py-3 px-8 rounded-full shadow-lg text-xl">
                ไม่คิดถึง
            </button>
        </div>
    </div>

    <div id="emoji-container"></div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const questionText = document.getElementById('question-text');
        const iconDisplay = document.getElementById('icon-display');
        const emojiContainer = document.getElementById('emoji-container');
        const modal = document.getElementById('modal');
        const overlay = document.getElementById('overlay');
        const modalText = document.getElementById('modal-text');

        const trolls = [
            "แน่ใจหรออออ?",
            "อย่ามาโกหกเค้านะ!",
            "มือสั่นหรอจ๊ะ?",
            "ใจร้ายที่สุดดดด",
            "เค้าไม่ยอมมมม"
        ];

        // ฟังก์ชันคำนวณตำแหน่งวิ่งหนี
        function moveButton() {
            const padding = 60;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // เมื่อเอาเมาส์มาโดน หรือแตะบนมือถือ ให้มันหนีไปรอบๆ
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        // ถ้าเขากดได้จริงๆ (ซึ่งยากมาก) ให้โชว์ Modal กวนๆ
        noBtn.addEventListener('click', () => {
            modalText.innerText = trolls[Math.floor(Math.random() * trolls.length)];
            modal.style.display = 'block';
            overlay.style.display = 'block';
        });

        function closeModal() {
            modal.style.display = 'none';
            overlay.style.display = 'none';
            // หลังจากกดปิด ให้ปุ่มหนีไปที่อื่นทันที
            moveButton();
        }

        // เมื่อกดปุ่ม "คิดถึง"
        yesBtn.addEventListener('click', () => {
            questionText.innerText = "เย้! เค้าก็คิดถึงที่สุดเลยยย 🥰";
            iconDisplay.innerText = "💏";
            noBtn.style.display = 'none';
            yesBtn.innerText = "รักนะจุ๊บๆ ✨";
            yesBtn.disabled = true;
            yesBtn.style.transform = "scale(1.2)";
            yesBtn.classList.remove('btn-hover');
            
            spawnEmojis();
        });

        function spawnEmojis() {
            const emojis = ['💖', '🥰', '✨', '🌸', '💘', '🧸', '🍭', '🌈', '🍓', '💌'];
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'emoji-float text-4xl';
                    emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.style.left = Math.random() * 100 + 'vw';
                    emoji.style.top = '100vh';
                    emoji.style.fontSize = (Math.random() * 30 + 25) + 'px';
                    
                    emojiContainer.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 2500);
                }, i * 60);
            }
        }
    </script>
</body>
</html>
